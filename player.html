<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿里云视频播放器测试</title>
    <link rel="stylesheet" href="https://g.alicdn.com/apsara-media-box/imp-web-player/2.25.1/skins/default/aliplayer-min.css" />
    <script charset="utf-8" type="text/javascript" src="https://g.alicdn.com/apsara-media-box/imp-web-player/2.25.1/aliplayer-min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            font-family: Arial, sans-serif; 
        }
        #J_prismPlayer { 
            width: 100vw; 
            height: 100vh; 
        }
        .error-msg { 
            color: #fff; 
            text-align: center; 
            padding-top: 200px; 
            font-size: 20px; 
        }
    </style>
</head>
<body>
    <div id="J_prismPlayer"></div>
    <script>
    (function() {
        // 从 URL 参数获取 vid 和 playAuth
        // 支持多种获取方式，确保兼容性
        let vid = null;
        let playAuth = null;
        
        // 方法1: 使用 URLSearchParams（标准方式）
        try {
            const urlParams = new URLSearchParams(window.location.search);
            vid = urlParams.get('vid');
            playAuth = urlParams.get('playAuth');
        } catch(e) {
            console.warn('URLSearchParams 解析失败:', e);
        }
        
        // 方法2: 如果方法1失败，手动解析（处理特殊字符）
        if (!playAuth) {
            const search = window.location.search;
            console.log('原始 URL search:', search);
            
            // 提取 vid
            const vidMatch = search.match(/[?&]vid=([^&]*)/);
            if (vidMatch && vidMatch[1]) {
                vid = vidMatch[1];
            }
            
            // 提取 playAuth（可能包含特殊字符）
            const authMatch = search.match(/[?&]playAuth=([^&]*)/);
            if (authMatch && authMatch[1]) {
                // 不进行 decodeURIComponent，直接使用原始值
                playAuth = authMatch[1];
                console.log('手动提取的 playAuth:', playAuth.substring(0, 100));
            }
        }
        
        // 设置默认 vid
        if (!vid) {
            vid = 'f01dd3771b8971f193f36633b79f0102';
        }
        
        // 清理 playAuth
        if (playAuth) {
            // 只清理首尾空白，不替换内部字符
            playAuth = playAuth.trim();
            
            // 检查是否是有效的 Base64
            const base64Regex = /^[A-Za-z0-9+/]+=*$/;
            if (!base64Regex.test(playAuth)) {
                console.warn('playAuth 可能不是有效的 Base64 格式');
                console.warn('playAuth 包含非法字符，尝试修复...');
                // 尝试修复：将空格转回 +
                playAuth = playAuth.replace(/ /g, '+');
            }
        }
        
        // 调试信息（打开 F12 控制台查看）
        console.log('=== 播放器调试信息 ===');
        console.log('VID:', vid);
        console.log('playAuth 是否存在:', !!playAuth);
        console.log('URL search 原始值:', window.location.search.substring(0, 200));
        if (playAuth) {
            console.log('playAuth 长度:', playAuth.length);
            console.log('playAuth 前 50 字符:', playAuth.substring(0, 50));
            console.log('playAuth 后 50 字符:', playAuth.substring(playAuth.length - 50));
            console.log('playAuth 是否包含空格:', playAuth.includes(' '));
            console.log('playAuth 是否包含 +:', playAuth.includes('+'));
            
            // 检查 Base64 有效性
            try {
                atob(playAuth);
                console.log('✅ playAuth Base64 格式有效');
            } catch(e) {
                console.error('❌ playAuth Base64 格式无效:', e.message);
            }
        }
        console.log('=====================');
        
        if (!playAuth) {
            document.body.innerHTML = '<div class="error-msg">缺少播放凭证（playAuth），请检查 URL 参数</div>';
            return;
        }
        
        // 初始化播放器
        var player = new Aliplayer({
            id: "J_prismPlayer",
            width: "100%",
            height: "100%",
            vid: vid,
            playauth: playAuth,
            // 区域配置
            region: "cn-shanghai",
            // 强制使用 H5 播放器
            useH5Prism: true,
            // 不指定格式，让播放器自动选择可用格式
            // format: 'm3u8',
            // 不指定清晰度，自动选择
            // definition: 'LD',
            // 自动播放
            autoplay: false,
            // 播放方式
            playsinline: true,
            isLive: false,
            rePlay: false,
            // 多清晰度支持
            qualitySort: 'asc',
            // 错误重试
            autoPlayDelay: 2,
            autoPlayDelayDisplayText: '正在加载...',
            // 预加载
            preload: true,
            // 如果视频加密，取消下面的注释
            // encryptType: 1,
        }, function (player) {
            console.log("Aliplayer 创建成功");
            console.log("播放器配置:", {
                vid: vid,
                region: "cn-shanghai",
                format: "auto (自动选择)",
                playAuthLength: playAuth.length
            });
        });
        
        // 捕获播放器错误（非常重要，便于看到真实原因）
        player.on('error', function(event) {
            console.error('播放器错误事件:', event);
            let errMsg = '播放失败，未知错误';
            let errorCode = '';
            
            if (event && event.paramData) {
                errorCode = event.paramData.error_code || '';
                errMsg = event.paramData.error_msg || event.paramData.message || event.paramData.display_msg || '未知错误';
                console.error('详细错误:', event.paramData);
                console.error('错误代码:', errorCode);
                
                // 根据错误代码提供解决建议
                let suggestion = '';
                switch(errorCode) {
                    case 4400:
                        suggestion = '<br><br>💡 可能原因：<br>1. 视频格式不支持（需要 MP4/HLS 格式）<br>2. 视频还在转码中，请稍后重试<br>3. 视频文件损坏';
                        break;
                    case 4012:
                        suggestion = '<br><br>💡 可能原因：playAuth 解码失败或已过期';
                        break;
                    case 4003:
                        suggestion = '<br><br>💡 可能原因：视频不存在或已删除';
                        break;
                }
                errMsg += suggestion;
            }
            
            document.body.innerHTML += '<div class="error-msg" style="color:#ff4444;">' + 
                (errorCode ? `错误代码: ${errorCode}<br>` : '') +
                errMsg + '<br><br>请查看控制台（F12）获取更多信息</div>';
        });
        
        // 可选：加载成功事件
        player.on('sourceloaded', function() {
            console.log('视频源加载成功');
        });
    })();
    </script>
</body>
</html>
