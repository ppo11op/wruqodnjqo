<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiphop 视频播放</title>
    <link rel="stylesheet" href="https://g.alicdn.com/apsara-media-box/imp-web-player/2.25.1/skins/default/aliplayer-min.css" />
    <script charset="utf-8" type="text/javascript" src="https://g.alicdn.com/apsara-media-box/imp-web-player/2.25.1/aliplayer-min.js"></script>
    <style>
        body { margin:0; padding:0; background:#000; overflow:hidden; }
        #J_prismPlayer { width:100%; height:100vh; }
    </style>
</head>
<body>
    <div id="J_prismPlayer"></div>

    <script>
        // 从 URL 参数获取 vid 和 playAuth
        const urlParams = new URLSearchParams(window.location.search);
        const vid = urlParams.get('vid') || '009ec4cd138c71f1bfc55017e1f80102';   // 你的默认 vid
        const playAuth = urlParams.get('playAuth');

        if (!playAuth) {
            document.body.innerHTML = '<div style="color:#fff;text-align:center;padding-top:100px;font-size:18px;">缺少播放凭证，请重试</div>';
        } else {
            var player = new Aliplayer({
                id: "J_prismPlayer",
                width: "100%",
                height: "100%",
                vid: vid,
                playauth: playAuth,
                autoplay: true,          // 可改成 false
                isLive: false,
                useH5Prism: true
            }, function (player) {
                console.log("Aliplayer 已创建成功");
            });
        }
    </script>
</body>
</html>
