<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿里云视频播放器测试</title>
    <link rel="stylesheet" href="https://g.alicdn.com/apsara-media-box/imp-web-player/2.25.1/skins/default/aliplayer-min.css" />
    <script charset="utf-8" type="text/javascript" src="https://g.alicdn.com/apsara-media-box/imp-web-player/2.25.1/aliplayer-min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            font-family: Arial, sans-serif; 
        }
        #J_prismPlayer { 
            width: 100vw; 
            height: 100vh; 
        }
        .error-msg { 
            color: #fff; 
            text-align: center; 
            padding-top: 200px; 
            font-size: 20px; 
        }
    </style>
</head>
<body>
    <div id="J_prismPlayer"></div>
    <script>
    (function() {
        // 从 URL 参数获取 vid 和 playAuth
        // 支持两种方式：已编码的 URL 和未编码的 URL
        const urlParams = new URLSearchParams(window.location.search);
        const vid = urlParams.get('vid') || 'f01dd3771b8971f193f36633b79f0102';
        let playAuth = urlParams.get('playAuth');
        
        // 如果 URLSearchParams 获取失败，尝试手动解析（处理未编码的情况）
        if (!playAuth) {
            const search = window.location.search;
            const match = search.match(/[?&]playAuth=([^&]*)/);
            if (match && match[1]) {
                playAuth = decodeURIComponent(match[1]);
            }
        }
        
        // 清理空白字符，并修复可能被破坏的 Base64 字符
        if (playAuth) {
            playAuth = playAuth.trim().replace(/ /g, '+');
        }
        
        // 调试信息（打开 F12 控制台查看）
        console.log('VID:', vid);
        console.log('playAuth 是否存在:', !!playAuth);
        if (playAuth) {
            console.log('playAuth 长度:', playAuth.length);
            console.log('playAuth 前 100 字符:', playAuth.substring(0, 100));
        }
        
        if (!playAuth) {
            document.body.innerHTML = '<div class="error-msg">缺少播放凭证（playAuth），请检查 URL 参数</div>';
            return;
        }
        
        // 初始化播放器
        var player = new Aliplayer({
            id: "J_prismPlayer",
            width: "100%",
            height: "100%",
            vid: vid,
            playauth: playAuth,
            // 区域配置（根据你的视频所在区域调整）
            region: "cn-shanghai",
            // 自动播放
            autoplay: false,
            // 是否显示控制栏
            isLive: false,
            // 重新播放
            rePlay: false,
            // 播放方式优先级
            playsinline: true,
            // H5 播放器配置
            useH5Prism: true,
            // 如果视频加密，取消下面的注释
            // encryptType: 1,
            // 格式支持
            format: 'mp4',
            // 多清晰度支持
            qualitySort: 'asc',
            // 错误重试
            autoPlayDelay: 2,
            autoPlayDelayDisplayText: '正在加载...',
        }, function (player) {
            console.log("Aliplayer 创建成功");
            console.log("播放器配置:", {
                vid: vid,
                region: "cn-shanghai",
                playAuthLength: playAuth.length
            });
        });
        
        // 捕获播放器错误（非常重要，便于看到真实原因）
        player.on('error', function(event) {
            console.error('播放器错误事件:', event);
            let errMsg = '播放失败，未知错误';
            let errorCode = '';
            
            if (event && event.paramData) {
                errorCode = event.paramData.error_code || '';
                errMsg = event.paramData.error_msg || event.paramData.message || event.paramData.display_msg || '未知错误';
                console.error('详细错误:', event.paramData);
                console.error('错误代码:', errorCode);
                
                // 根据错误代码提供解决建议
                let suggestion = '';
                switch(errorCode) {
                    case 4400:
                        suggestion = '<br><br>💡 可能原因：<br>1. 视频格式不支持（需要 MP4/HLS 格式）<br>2. 视频还在转码中，请稍后重试<br>3. 视频文件损坏';
                        break;
                    case 4012:
                        suggestion = '<br><br>💡 可能原因：playAuth 解码失败或已过期';
                        break;
                    case 4003:
                        suggestion = '<br><br>💡 可能原因：视频不存在或已删除';
                        break;
                }
                errMsg += suggestion;
            }
            
            document.body.innerHTML += '<div class="error-msg" style="color:#ff4444;">' + 
                (errorCode ? `错误代码: ${errorCode}<br>` : '') +
                errMsg + '<br><br>请查看控制台（F12）获取更多信息</div>';
        });
        
        // 可选：加载成功事件
        player.on('sourceloaded', function() {
            console.log('视频源加载成功');
        });
    })();
    </script>
</body>
</html>
