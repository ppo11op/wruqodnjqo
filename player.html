<script>
    const urlParams = new URLSearchParams(window.location.search);
    const vid = urlParams.get('vid') || 'f01dd3771b8971f193f36633b79f0102';  // 注意：你代码里是 009ec... 但之前用的是 f01dd...，确认一致

    let playAuth = urlParams.get('playAuth');

    // 强烈建议：无论来源，都强制清理空白（防复制粘贴问题）
    if (playAuth) {
        playAuth = playAuth.trim().replace(/\s+/g, '');
    }

    if (!playAuth) {
        document.body.innerHTML = '<div style="color:#fff;text-align:center;padding-top:100px;font-size:18px;">缺少播放凭证，请重试</div>';
        return;
    }

    // 调试输出（打开 F12 控制台看）
    console.log("VID:", vid);
    console.log("playAuth 长度:", playAuth.length);
    console.log("playAuth 前60字符:", playAuth.substring(0, 60));
    console.log("是否有空白:", /\s/.test(playAuth));

    var player = new Aliplayer({
        id: "J_prismPlayer",
        width: "100%",
        height: "100%",
        vid: vid,
        playauth: playAuth,
        // 建议加这些，防加密视频或区域问题
      //  encryptType: 1,           // 如果视频加密
        // region: "cn-shanghai", // 如果不是默认区域
    }, function (player) {
        console.log("Aliplayer 创建成功");
    });

    // 捕获播放器错误（非常重要！）
    player.on('error', function (event) {
        console.error('播放器错误详情:', event);
        console.error('错误代码/消息:', event.paramData);
        // 可以在这里弹窗或替换内容显示真实错误
        document.body.innerHTML += '<div style="color:red;text-align:center;">播放失败：' + (event.paramData?.error_msg || '未知错误') + '</div>';
    });
</script>
